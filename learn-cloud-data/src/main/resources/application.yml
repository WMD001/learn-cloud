spring:
  h2:
    console:
      enabled: true
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:file:./learn-cloud-data/src/main/resources/db/meta_data
    username: sa
    password: 123456
  sql:
    init:
      mode: always

server:
  servlet:
    context-path: /data
  port: 8003
