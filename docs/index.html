<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>开源学习笔记</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Description">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify-darklight-theme@latest/dist/style.min.css" title="docsify-darklight-theme" type="text/css"/>

</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: '开源学习笔记',
      repo: 'https://github.com/WMD001/learn-cloud',

      routerMode: "history",
      loadNavbar: true,
      loadSidebar: true,
      subMaxLevel: 3,

      // beian: {
      //   ICP: "京ICP备2021007899号-1",
      //   NISMSP: {
      //     number: "",
      //     url: "",
      //     id: ""
      //   },
      // },

      search: {
        placeholder: "内容搜索",
        noData: "未搜索到相关内容",
        depth: 4,
        hideOtherSidebarContent: false
      },

      copyCode: {
        buttonText: "Copy"
      },

      count:{
        float: "left",
        countable:true,
        fontsize:'0.9em',
        color:'rgb(90,90,90)',
        language:'chinese'
      },

      tabs: {
        sync: false
      },

      pagination: {
        previousText: 'Previous',
        nextText: "Next",
        crossChapter: true,
        crossChapterText: true,
      },

      // footer: {
      //   copy: '<span>Acme &copy; 2020</span>',
      //   auth: 'by Me',
      //   pre: '<hr/>',
      //   style: 'text-align: center;',
      //   class: 'className',
      // },

    }
  </script>
  <!-- Docsify v4 -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-beian@latest/dist/beian.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-copy-code/dist/docsify-copy-code.min.js"></script>
  <script src="//unpkg.com/docsify-count/dist/countable.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-tabs@1"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-darklight-theme@latest/dist/index.min.js" type="text/javascript"></script>
  <script src="//unpkg.com/docsify-footer-enh/dist/docsify-footer-enh.min.js"></script>
  <script src="//unpkg.com/docsify-pagination/dist/docsify-pagination.min.js"></script>

  <script src="plugins/prism-java.min.js"></script>
  <script src="plugins/prism-bash.min.js"></script>
  <script src="plugins/prism-json.min.js"></script>
  <script src="plugins/prism-sql.min.js"></script>
  <script src="plugins/prism-yaml.min.js"></script>
  <script src="plugins/prism-javadoc.min.js"></script>
  <script src="plugins/prism-python.min.js"></script>
  <script src="plugins/prism-docker.min.js"></script>

</body>
</html>
